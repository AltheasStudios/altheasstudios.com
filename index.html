<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Altheas Studios | Coming Soon</title>

    <!-- Google Fonts: Space Grotesk for a clean, modern studio feel -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600&display=swap"
      rel="stylesheet"
    />

    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Tailwind Configuration -->
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Space Grotesk", "sans-serif"],
            },
          },
        },
      };
    </script>

    <style>
      /* Smooth subtle gradient animation for the background */
      body {
        background: linear-gradient(-45deg, #e0f2fe, #bae6fd, #7dd3fc, #e0f2fe);
        background-size: 400% 400%;
        animation: gradientBG 15s ease infinite;
      }

      @keyframes gradientBG {
        0% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
        100% {
          background-position: 0% 50%;
        }
      }
    </style>
  </head>
  <body
    class="min-h-screen flex flex-col justify-between text-slate-800 font-sans selection:bg-sky-300 selection:text-slate-900"
  >
    <!-- Top Spacer for alignment -->
    <div class="pt-12"></div>

    <!-- Main Content -->
    <main class="flex-grow flex flex-col items-center justify-center px-6">
      <!-- Logo / Studio Name -->
      <div class="text-center mb-10">
        <h1
          class="text-4xl md:text-6xl font-semibold tracking-[0.2em] text-slate-900 uppercase mb-3"
        >
          Altheas <span class="text-sky-600">Studios</span>
        </h1>
        <p
          class="text-slate-600 text-sm md:text-base tracking-widest uppercase font-light"
        >
          Independent Game Development
        </p>
      </div>

      <!-- Clean "Coming Soon" Box -->
      <div
        class="bg-white/40 border border-white/60 p-8 rounded-2xl backdrop-blur-md max-w-md w-full text-center shadow-sm"
      >
        <h2
          class="text-2xl md:text-3xl font-semibold text-slate-800 mb-3 tracking-wide"
        >
          Coming Soon
        </h2>
        <div class="w-12 h-1 bg-sky-500 mx-auto mb-4 rounded-full"></div>
        <p class="text-slate-600 leading-relaxed text-sm md:text-base">
          We are currently setting up our new digital home. <br />
          Great things are in the works.
        </p>
      </div>
    </main>

    <!-- Footer (Impressum & Copyright) -->
    <footer class="py-8 mt-12">
      <div
        class="max-w-4xl mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-4 text-xs text-slate-500 tracking-wider"
      >
        <p>&copy; 2026 Altheas Studios. All rights reserved.</p>

        <div class="flex gap-6 uppercase font-semibold">
          <a href="#" class="hover:text-sky-600 transition-colors duration-300"
            >Press Kit</a
          >
          <a href="#" class="hover:text-sky-600 transition-colors duration-300"
            >Twitter</a
          >
          <a href="#" class="hover:text-sky-600 transition-colors duration-300"
            >LinkedIn</a
          >
          <a href="#" class="hover:text-sky-600 transition-colors duration-300"
            >Impressum</a
          >
        </div>
      </div>
    </footer>
  </body>
</html>
