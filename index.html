<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Altheas Studios</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Inter:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  />
</head>
<body>

  <!-- ─── Mount point — sections are injected here by script.js ─── -->
  <div id="app">
    <div class="page-loader">
      <div class="loader-logo"><img src="assets/logo.png" alt="Altheas Studios"></div>
    </div>
  </div>

  <!-- ── Locale files (data only, no DOM manipulation) ── -->
  <script src="locales/en.js"></script>
  <script src="locales/tr.js"></script>
  <script src="locales/de.js"></script>

  <!-- ── Main app (fetches sections, assembles DOM, runs i18n + animations) ── -->
  <script src="script.js"></script>

</body>
</html>
